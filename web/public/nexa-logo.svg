<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Left bar gradient: Indigo → Violet -->
    <linearGradient id="grad-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <!-- Diagonal gradient: Violet → Pink -->
    <linearGradient id="grad-diag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <!-- Right bar gradient: Pink → Indigo -->
    <linearGradient id="grad-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Left vertical bar -->
  <path d="M25,20 L38,20 L38,80 L25,80 Z" fill="url(#grad-left)"/>
  <!-- Diagonal folding piece -->
  <path d="M25,20 L38,20 L75,80 L62,80 Z" fill="url(#grad-diag)"/>
  <!-- Right vertical bar -->
  <path d="M62,20 L75,20 L75,80 L62,80 Z" fill="url(#grad-right)"/>
  <!-- Accent dot (gold) -->
  <circle cx="81" cy="18" r="4" fill="#FBBF24"/>
</svg>
